<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #1f2328;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #f6f8fa;
      border-right: 1px solid #d0d7de;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 12px 10px 8px;
      border-bottom: 1px solid #d0d7de;
    }
    .btn-new-chat {
      width: 100%;
      background: #1f883d;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    .btn-new-chat:hover { background: #2da44e; }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-item:hover { background: #eaeef2; }
    .sidebar-item.active { background: #ddf4ff; }
    .sidebar-main {
      min-width: 0;
      flex: 1;
    }
    .sidebar-prompt {
      font-size: 12px;
      color: #1f2328;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .sidebar-item.active .sidebar-prompt { color: #0969da; }
    .sidebar-status { font-size: 11px; }
    .sidebar-delete {
      background: none;
      border: none;
      color: #848d97;
      font-size: 12px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.1s, color 0.1s, background 0.1s;
    }
    .sidebar-item:hover .sidebar-delete,
    .sidebar-item.active .sidebar-delete { opacity: 1; }
    .sidebar-delete:hover {
      color: #cf222e;
      background: #ffebe9;
    }

    .sidebar-bottom {
      padding: 10px 12px;
      border-top: 1px solid #d0d7de;
      display: flex;
      justify-content: flex-end;
    }
    .btn-gear {
      background: none;
      border: none;
      color: #848d97;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-gear:hover { color: #1f2328; }

    /* ── Main area ───────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #ffffff;
    }

    .conversation-feed {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .empty-hint {
      margin: auto;
      color: #9aa0a6;
      font-size: 13px;
      font-style: italic;
      text-align: center;
    }

    /* ── Conversation turns ──────────────────────────── */
    .turn-user {
      display: flex;
      justify-content: flex-end;
    }
    .user-bubble {
      background: #ddf4ff;
      color: #1f2328;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 12px 12px 2px 12px;
      max-width: 70%;
      word-break: break-word;
    }

    .turn-agent {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 88%;
    }
    .agent-label {
      font-size: 10px;
      color: #848d97;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    /* ── Command cards ───────────────────────────────── */
    .cmd-card {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 2px 8px 8px 8px;
      overflow: hidden;
    }
    .cmd-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: #eaeef2;
    }
    .cmd-argv {
      flex: 1;
      color: #0969da;
      font-size: 12px;
      word-break: break-all;
    }
    .cmd-argv::before { content: "$ "; color: #9aa0a6; }

    .badge-ok   { font-size: 11px; color: #1a7f37; flex-shrink: 0; }
    .badge-err  { font-size: 11px; color: #cf222e; flex-shrink: 0; }
    .badge-denied { font-size: 11px; color: #9a6700; flex-shrink: 0; }

    .skill-tag {
      font-size: 10px;
      background: #ddf4ff;
      color: #0550ae;
      border: 1px solid #b6e3ff;
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }
    .skill-tag.fallback {
      background: #eaeef2;
      color: #848d97;
      border-color: #c8cdd3;
    }

    .cmd-rationale {
      font-size: 11px;
      color: #848d97;
      font-style: italic;
      padding: 4px 12px 6px;
      border-top: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    .cmd-output {
      border-top: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    .cmd-output-toggle {
      padding: 5px 12px;
      font-size: 10px;
      color: #9aa0a6;
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    .cmd-output-toggle::-webkit-details-marker { display: none; }
    .cmd-output[open] .cmd-output-toggle::before { content: "▾ "; }
    .cmd-output:not([open]) .cmd-output-toggle::before { content: "▸ "; }
    .cmd-output pre {
      padding: 0 12px 8px;
      font-size: 11px;
      color: #454c54;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 180px;
      overflow-y: auto;
    }
    .cmd-output pre.stderr { color: #cf222e; }

    /* ── Thinking indicator ──────────────────────────── */
    .thinking {
      font-size: 12px;
      color: #0550ae;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 0;
    }

    /* ── Approval card ───────────────────────────────── */
    .approval-card {
      background: #fbefff;
      border: 1px solid #8250df;
      border-radius: 2px 8px 8px 8px;
      overflow: hidden;
    }
    .approval-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border-bottom: 1px solid #d8b9ff;
      font-size: 11px;
      color: #8250df;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .approval-dot {
      width: 7px;
      height: 7px;
      background: #8250df;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .approval-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
    .approval-cmd {
      font-size: 12px;
      color: #0969da;
      word-break: break-all;
    }
    .approval-cmd::before { content: "$ "; color: #9aa0a6; }
    .approval-rationale { font-size: 11px; color: #848d97; font-style: italic; }
    .approval-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-approve {
      background: #dafbe1; border: 1px solid #2da44e; color: #1a7f37;
      border-radius: 5px; padding: 5px 14px; font-size: 12px;
      font-family: inherit; cursor: pointer;
    }
    .btn-approve:hover:not(:disabled) { background: #c6efcb; }
    .btn-deny {
      background: #ffebe9; border: 1px solid #cf222e; color: #cf222e;
      border-radius: 5px; padding: 5px 14px; font-size: 12px;
      font-family: inherit; cursor: pointer;
    }
    .btn-deny:hover:not(:disabled) { background: #ffd7d3; }
    .btn-approve:disabled, .btn-deny:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── AI summary block (done) ─────────────────────── */
    .summary-block {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 2px 8px 8px 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #454c54;
      line-height: 1.6;
      margin-top: 2px;
    }

    /* ── Status banner (errors) ──────────────────────── */
    .status-banner {
      border-radius: 6px;
      padding: 9px 13px;
      font-size: 12px;
      margin-top: 4px;
    }
    .status-banner.s-failed        { background: #ffebe9; border: 1px solid #cf222e; color: #cf222e; }
    .status-banner.s-policy_denied { background: #fff8c5; border: 1px solid #d4a72c; color: #9a6700; }

    /* ── Input area ──────────────────────────────────── */
    .input-area {
      padding: 12px 32px 16px;
      border-top: 1px solid #d0d7de;
      background: #ffffff;
    }
    .input-wrapper {
      background: #ffffff;
      border: 1px solid #c8cdd3;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .input-wrapper:focus-within { border-color: #0969da; }
    .input-wrapper.disabled { opacity: 0.5; }
    #prompt-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #1f2328;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      height: 22px;
    }
    #prompt-input::placeholder { color: #9aa0a6; }
    #run-btn {
      background: #1f883d;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      flex-shrink: 0;
    }
    #run-btn:hover:not(:disabled) { background: #2da44e; }
    #run-btn:disabled { background: #eaeef2; color: #848d97; cursor: not-allowed; }

    /* ── Status pill colours ─────────────────────────── */
    .s-running       { color: #0550ae; }
    .s-waiting_approval { color: #8250df; }
    .s-done          { color: #1a7f37; }
    .s-failed        { color: #cf222e; }
    .s-policy_denied { color: #9a6700; }

    /* ── Spinner ─────────────────────────────────────── */
    .spin {
      display: inline-block;
      width: 9px; height: 9px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Skills modal ────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31,35,40,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      width: 600px;
      max-width: 95vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #d0d7de;
    }
    .modal-header h2 { font-size: 15px; color: #1f2328; }
    .btn-close {
      background: none; border: none; color: #848d97;
      font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px;
    }
    .btn-close:hover { color: #1f2328; }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 18px; }

    /* Settings section inside modal */
    .settings-section {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settings-section label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; color: #636c76; font-size: 12px;
    }

    /* Skill cards */
    .skill-card {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 11px 13px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .skill-info { flex: 1; min-width: 0; }
    .skill-name { color: #0969da; font-weight: 600; font-size: 13px; margin-bottom: 3px; }
    .skill-desc { color: #636c76; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .skill-actions { display: flex; gap: 5px; flex-shrink: 0; }
    .policy-badge { font-size: 10px; border-radius: 4px; padding: 1px 6px; font-weight: 500; flex-shrink: 0; margin-top: 5px; display: inline-block; }
    .policy-badge.has-policy { background: #dafbe1; color: #1a7f37; }
    .policy-badge.no-policy  { background: #eaeef2; color: #848d97; }

    button.btn-sm { padding: 4px 9px; font-size: 11px; font-weight: 500; font-family: inherit; border-radius: 5px; cursor: pointer; border: none; }
    button.btn-secondary { background: #f6f8fa; border: 1px solid #d0d7de; color: #454c54; }
    button.btn-secondary:hover { background: #eaeef2; }
    button.btn-danger { background: #ffebe9; color: #cf222e; border: 1px solid #cf222e; }
    button.btn-danger:hover { background: #ffd7d3; }
    button.toggle-enabled { cursor: pointer; font-size: 11px; color: #636c76; padding: 4px 9px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 5px; font-family: inherit; }
    button.toggle-enabled.on { color: #1a7f37; border-color: #2da44e; background: #dafbe1; }

    .skill-form {
      background: #f6f8fa;
      border: 1px solid #0969da;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .skill-form label { display: block; color: #636c76; font-size: 11px; margin-bottom: 3px; margin-top: 10px; }
    .skill-form label:first-of-type { margin-top: 0; }
    .skill-form input[type="text"],
    .skill-form textarea {
      width: 100%;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 5px;
      color: #1f2328;
      padding: 7px 9px;
      font-family: inherit;
      font-size: 12px;
    }
    .skill-form input[type="text"]:focus,
    .skill-form textarea:focus { outline: none; border-color: #0969da; }
    .skill-form textarea { min-height: 100px; resize: vertical; }
    .form-actions { display: flex; gap: 7px; margin-top: 12px; }

    .policy-popup {
      margin-top: 8px;
      padding: 10px 12px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .policy-popup label {
      font-size: 12px;
      font-weight: 500;
      color: #1f2328;
    }
    .policy-popup textarea {
      width: 100%;
      resize: vertical;
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      background: #fff;
      box-sizing: border-box;
    }

    .modal-add-btn {
      width: 100%;
      background: none;
      border: 1px dashed #c8cdd3;
      color: #848d97;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
    }
    .modal-add-btn:hover { border-color: #0969da; color: #0969da; }

    .no-items-msg { color: #848d97; font-size: 12px; font-style: italic; text-align: center; padding: 20px; }

    /* ── Per-conversation skills bar ─────────────────────── */
    .conv-skills-bar {
      border-top: 1px solid #d0d7de;
      background: #f6f8fa;
      padding: 6px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 36px;
    }
    .conv-skills-label {
      font-size: 10px;
      color: #9aa0a6;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .conv-skills-bar.hidden { display: none; }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────── -->
<div class="sidebar">
  <div class="sidebar-top">
    <button class="btn-new-chat" onclick="newChat()">+ New chat</button>
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
  <div class="sidebar-bottom">
    <button class="btn-gear" onclick="openSkillsModal()" title="Skills &amp; Settings">⚙</button>
  </div>
</div>

<!-- ── Main area ──────────────────────────────────── -->
<div class="main">
  <div class="conversation-feed" id="conversation-feed">
    <div class="empty-hint">Start a new chat or select one from the sidebar.</div>
  </div>
  <!-- ── Per-conversation skills bar ────────────────────── -->
  <div class="conv-skills-bar hidden" id="conv-skills-bar">
    <span class="conv-skills-label">This conversation:</span>
    <div id="conv-skills-toggles" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="input-area">
    <div class="input-wrapper" id="input-wrapper">
      <input id="prompt-input" placeholder="Ask the agent something…"
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitRun();}" />
      <button id="run-btn" onclick="submitRun()">&#9654;</button>
    </div>
  </div>
</div>

<!-- ── Skills modal ───────────────────────────────── -->
<div class="modal-overlay hidden" id="skills-modal" onclick="if(event.target===this)closeSkillsModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>Skills &amp; Settings</h2>
      <button class="btn-close" onclick="closeSkillsModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <!-- Approval toggle -->
      <div class="settings-section">
        <label>
          <input type="checkbox" id="approval-toggle" onchange="onApprovalToggle(this)"
                 style="accent-color:#a371f7;cursor:pointer;" />
          Require approval before each command
        </label>
      </div>
      <!-- Skill form -->
      <div id="skill-form-container"></div>
      <!-- Skills list -->
      <div id="skills-list"></div>
      <button class="modal-add-btn" onclick="showSkillForm()">+ Add skill</button>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  const runs = {};       // run_id → RunContext
  const runOrder = [];   // insertion order
  const polling = new Set();
  let selectedRootId = null;

  // ── Chain helpers ──────────────────────────────────────
  function getRoots() {
    return runOrder.filter(id => !runs[id]?.parent_run_id);
  }

  function getChain(rootId) {
    const chain = [];
    let current = rootId;
    while (current) {
      chain.push(current);
      const next = runOrder.find(id => runs[id]?.parent_run_id === current) || null;
      current = next;
    }
    return chain;
  }

  function getChainTailStatus(rootId) {
    const chain = getChain(rootId);
    return runs[chain[chain.length - 1]]?.status ?? 'running';
  }

  // ── Data helpers ───────────────────────────────────────
  function upsertRun(run) {
    if (!runs[run.run_id]) runOrder.push(run.run_id);
    runs[run.run_id] = run;
  }

  // ── Polling ────────────────────────────────────────────
  async function pollRun(run_id) {
    if (polling.has(run_id)) return;
    polling.add(run_id);
    while (true) {
      try {
        const res = await fetch('/api/agent/runs/' + run_id);
        if (!res.ok) break;
        const data = await res.json();
        upsertRun(data);
        render();
        if (data.status !== 'running' && data.status !== 'waiting_approval') break;
      } catch { break; }
      await sleep(2000);
    }
    polling.delete(run_id);
  }

  // ── Initial load ───────────────────────────────────────
  async function loadAll() {
    await loadSettings();
    try {
      const res = await fetch('/api/agent/runs');
      if (!res.ok) return;
      const list = await res.json();
      for (const r of list) {
        upsertRun(r);
        if (r.status === 'running' || r.status === 'waiting_approval') pollRun(r.run_id);
      }
      const roots = getRoots();
      if (roots.length > 0) {
        selectedRootId = roots[roots.length - 1];
        const chain = getChain(selectedRootId);
        loadConvSkills(chain[chain.length - 1]);
      } else {
        loadConvSkillsForNewChat();
      }
    } catch {}
    render();
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    renderSidebar();
    renderMain();
  }

  // ── Sidebar ────────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    const roots = getRoots().slice().reverse(); // newest first
    if (roots.length === 0) {
      list.innerHTML = '<div style="color:#484f58;font-size:11px;font-style:italic;padding:8px 4px;">No conversations yet.</div>';
      return;
    }
    for (const rootId of roots) {
      const run = runs[rootId];
      const status = getChainTailStatus(rootId);
      const item = document.createElement('div');
      item.className = 'sidebar-item' + (rootId === selectedRootId ? ' active' : '');
      item.onclick = () => selectConversation(rootId);

      const main = document.createElement('div');
      main.className = 'sidebar-main';

      const prompt = document.createElement('div');
      prompt.className = 'sidebar-prompt';
      prompt.textContent = run.prompt;

      const badge = document.createElement('div');
      badge.className = 'sidebar-status';
      badge.innerHTML = statusHtml(status);

      const del = document.createElement('button');
      del.className = 'sidebar-delete';
      del.title = 'Delete conversation';
      del.setAttribute('aria-label', 'Delete conversation');
      del.innerHTML = '&#x1f5d1;';
      del.onclick = (event) => {
        event.stopPropagation();
        deleteConversation(rootId);
      };

      main.appendChild(prompt);
      main.appendChild(badge);
      item.appendChild(main);
      item.appendChild(del);
      list.appendChild(item);
    }
  }

  function statusHtml(status) {
    const map = {
      running:          '<span class="s-running"><span class="spin"></span> running</span>',
      waiting_approval: '<span class="s-waiting_approval">&#x25cf; approval</span>',
      done:             '<span class="s-done">&#x2713; done</span>',
      failed:           '<span class="s-failed">&#x2717; failed</span>',
      policy_denied:    '<span class="s-policy_denied">&#x2717; denied</span>',
    };
    return map[status] ?? status;
  }

  function selectConversation(rootId) {
    selectedRootId = rootId;
    render();
    // Load per-conversation skills for the tail run
    const chain = getChain(rootId);
    const tailRunId = chain[chain.length - 1];
    loadConvSkills(tailRunId);
  }

  // ── Main area ──────────────────────────────────────────
  function renderMain() {
    const feed = document.getElementById('conversation-feed');

    if (!selectedRootId) {
      feed.innerHTML = '<div class="empty-hint">Start a new chat or select one from the sidebar.</div>';
      setInputState(false, 'Ask the agent something\u2026');
      return;
    }

    const chain = getChain(selectedRootId);
    const tailRun = runs[chain[chain.length - 1]];
    const tailStatus = tailRun?.status;

    const frag = document.createDocumentFragment();
    for (const runId of chain) {
      const run = runs[runId];
      if (!run) continue;

      // User turn
      const userTurn = document.createElement('div');
      userTurn.className = 'turn-user';
      const bubble = document.createElement('div');
      bubble.className = 'user-bubble';
      bubble.textContent = run.prompt;
      userTurn.appendChild(bubble);
      frag.appendChild(userTurn);

      // Agent turn
      frag.appendChild(buildAgentTurn(run));
    }

    feed.innerHTML = '';
    feed.appendChild(frag);
    feed.scrollTop = feed.scrollHeight;

    if (tailStatus === 'waiting_approval') {
      setInputState(true, 'Waiting for approval\u2026');
    } else if (tailStatus === 'running') {
      setInputState(true, 'Agent is working\u2026');
    } else {
      setInputState(false, 'Continue this chat\u2026');
    }
  }

  function buildAgentTurn(run) {
    const div = document.createElement('div');
    div.className = 'turn-agent';

    const label = document.createElement('div');
    label.className = 'agent-label';
    label.textContent = 'Agent';
    div.appendChild(label);

    const parentHistoryLength = run.parent_run_id
      ? (runs[run.parent_run_id]?.history?.length ?? 0)
      : 0;
    for (const action of (run.history || []).slice(parentHistoryLength)) {
      div.appendChild(buildCommandCard(action));
    }

    // Thinking indicator — show while running with no history yet
    if (run.status === 'running' && (!run.history || run.history.length === 0)) {
      const t = document.createElement('div');
      t.className = 'thinking';
      t.innerHTML = '<span class="spin"></span> Thinking\u2026';
      div.appendChild(t);
    }

    // Approval card
    if (run.status === 'waiting_approval' && run.pending_command) {
      div.appendChild(buildApprovalCard(run));
    }

    // AI summary for done runs
    if (run.status === 'done') {
      const summary = document.createElement('div');
      summary.className = 'summary-block';
      summary.textContent = run.final_message || '(no response)';
      div.appendChild(summary);
    }

    // Error status banners
    if (['failed', 'policy_denied'].includes(run.status) && run.final_message) {
      const banner = document.createElement('div');
      banner.className = 'status-banner s-' + run.status;
      banner.textContent = run.final_message;
      div.appendChild(banner);
    }

    return div;
  }

  function buildCommandCard(action) {
    const card = document.createElement('div');
    card.className = 'cmd-card';

    const head = document.createElement('div');
    head.className = 'cmd-head';

    const cmd = document.createElement('span');
    cmd.className = 'cmd-argv';
    cmd.textContent = (action.command?.argv ?? []).join(' ');
    head.appendChild(cmd);

    if (!action.allowed) {
      const d = document.createElement('span');
      d.className = 'badge-denied';
      d.textContent = 'DENIED';
      head.appendChild(d);
    } else {
      if (action.exit_code !== null && action.exit_code !== undefined) {
        const ec = document.createElement('span');
        ec.className = action.exit_code === 0 ? 'badge-ok' : 'badge-err';
        ec.textContent = 'exit ' + action.exit_code;
        head.appendChild(ec);
      }
      const tag = document.createElement('span');
      tag.className = 'skill-tag' + (action.skill_name ? '' : ' fallback');
      tag.textContent = action.skill_name ? 'skill: ' + action.skill_name : 'global policy';
      head.appendChild(tag);
    }
    card.appendChild(head);

    if (action.command?.rationale) {
      const rat = document.createElement('div');
      rat.className = 'cmd-rationale';
      rat.textContent = '\u21b3 ' + action.command.rationale;
      card.appendChild(rat);
    }

    if (action.stdout || action.stderr) {
      const details = document.createElement('details');
      details.className = 'cmd-output';
      details.open = true;
      const summary = document.createElement('summary');
      summary.className = 'cmd-output-toggle';
      summary.textContent = 'output';
      details.appendChild(summary);
      if (action.stdout) {
        const pre = document.createElement('pre');
        pre.textContent = action.stdout;
        details.appendChild(pre);
      }
      if (action.stderr) {
        const pre = document.createElement('pre');
        pre.className = 'stderr';
        pre.textContent = action.stderr;
        details.appendChild(pre);
      }
      card.appendChild(details);
    }

    return card;
  }

  function buildApprovalCard(run) {
    const card = document.createElement('div');
    card.className = 'approval-card';

    const hdr = document.createElement('div');
    hdr.className = 'approval-header';
    const dot = document.createElement('span');
    dot.className = 'approval-dot';
    hdr.appendChild(dot);
    hdr.appendChild(document.createTextNode(' Awaiting your approval'));
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'approval-body';

    const cmd = document.createElement('div');
    cmd.className = 'approval-cmd';
    cmd.textContent = run.pending_command.argv.join(' ');
    body.appendChild(cmd);

    const rat = document.createElement('div');
    rat.className = 'approval-rationale';
    rat.textContent = '\u21b3 ' + run.pending_command.rationale;
    body.appendChild(rat);

    const actions = document.createElement('div');
    actions.className = 'approval-actions';

    const approve = document.createElement('button');
    approve.className = 'btn-approve';
    approve.textContent = 'Approve';

    const deny = document.createElement('button');
    deny.className = 'btn-deny';
    deny.textContent = 'Deny';

    approve.onclick = async () => {
      approve.disabled = true; deny.disabled = true;
      await fetch('/api/agent/runs/' + run.run_id + '/approve', { method: 'POST' });
      const r = await fetch('/api/agent/runs/' + run.run_id);
      if (r.ok) { upsertRun(await r.json()); render(); }
      pollRun(run.run_id);
    };
    deny.onclick = async () => {
      approve.disabled = true; deny.disabled = true;
      await fetch('/api/agent/runs/' + run.run_id + '/deny', { method: 'POST' });
      const r = await fetch('/api/agent/runs/' + run.run_id);
      if (r.ok) { upsertRun(await r.json()); render(); }
    };

    actions.appendChild(approve);
    actions.appendChild(deny);
    body.appendChild(actions);
    card.appendChild(body);
    return card;
  }

  function setInputState(disabled, placeholder) {
    const input = document.getElementById('prompt-input');
    const btn   = document.getElementById('run-btn');
    const wrap  = document.getElementById('input-wrapper');
    input.disabled = disabled;
    input.placeholder = placeholder;
    btn.disabled = disabled;
    wrap.classList.toggle('disabled', disabled);
  }

  // ── Submit ─────────────────────────────────────────────
  async function submitRun() {
    const input = document.getElementById('prompt-input');
    const prompt = input.value.trim();
    if (!prompt) { input.focus(); return; }

    let context_run_id = null;
    if (selectedRootId) {
      const chain = getChain(selectedRootId);
      context_run_id = chain[chain.length - 1];
    }

    input.value = '';
    setInputState(true, 'Agent is working\u2026');

    const body = { prompt };
    if (context_run_id) body.context_run_id = context_run_id;

    try {
      const res = await fetch('/api/agent/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      upsertRun({
        run_id: data.run_id,
        prompt,
        status: 'running',
        history: [],
        parent_run_id: context_run_id,
      });

      if (!context_run_id) selectedRootId = data.run_id;
      render();
      await applyPendingOverrides(data.run_id);
      pollRun(data.run_id);
      loadConvSkills(data.run_id);
    } catch (e) {
      setInputState(false, 'Continue this chat\u2026');
      alert('Failed to start run: ' + e.message);
    }
  }

  // ── New chat ───────────────────────────────────────────
  function newChat() {
    selectedRootId = null;
    loadConvSkillsForNewChat();
    render();
    document.getElementById('prompt-input').focus();
  }

  async function deleteConversation(rootId) {
    try {
      const res = await fetch('/api/agent/runs/' + rootId, { method: 'DELETE' });
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const removeIds = new Set(getChain(rootId));
      for (const rid of Array.from(removeIds)) {
        delete runs[rid];
      }
      for (let i = runOrder.length - 1; i >= 0; i--) {
        if (removeIds.has(runOrder[i])) runOrder.splice(i, 1);
      }

      if (selectedRootId === rootId) {
        selectedRootId = null;
        loadConvSkillsForNewChat();
      }

      render();
    } catch (e) {
      alert('Failed to delete conversation: ' + e.message);
    }
  }

  // ── Settings ───────────────────────────────────────────
  async function loadSettings() {
    try {
      const res = await fetch('/api/settings');
      if (!res.ok) return;
      const data = await res.json();
      const toggle = document.getElementById('approval-toggle');
      if (toggle) toggle.checked = data.approval_required;
    } catch {}
  }

  async function onApprovalToggle(checkbox) {
    try {
      const res = await fetch('/api/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ approval_required: checkbox.checked }),
      });
      if (!res.ok) checkbox.checked = !checkbox.checked;
    } catch { checkbox.checked = !checkbox.checked; }
  }

  // ── Skills modal ───────────────────────────────────────
  async function openSkillsModal() {
    document.getElementById('skills-modal').classList.remove('hidden');
    await loadSettings();
    await loadSkills();
  }

  function closeSkillsModal() {
    document.getElementById('skills-modal').classList.add('hidden');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSkillsModal();
  });

  // ── Skills CRUD ────────────────────────────────────────
  let skillsData = [];

  async function loadSkills() {
    try {
      const res = await fetch('/api/skills');
      if (!res.ok) return;
      skillsData = await res.json();
      renderSkills();
    } catch {}
  }

  function renderSkills() {
    const container = document.getElementById('skills-list');
    if (skillsData.length === 0) {
      container.innerHTML = '<div class="no-items-msg">No skills yet.</div>';
      return;
    }
    container.innerHTML = '';
    for (const skill of skillsData) container.appendChild(buildSkillCard(skill));
  }

  function buildSkillCard(skill) {
    const card = document.createElement('div');
    card.className = 'skill-card';
    card.id = 'skill-' + skill.id;

    const info = document.createElement('div');
    info.className = 'skill-info';
    const name = document.createElement('div');
    name.className = 'skill-name';
    name.textContent = skill.name;
    const desc = document.createElement('div');
    desc.className = 'skill-desc';
    desc.textContent = skill.description;
    const badge = document.createElement('span');
    badge.className = 'policy-badge ' + (skill.policy ? 'has-policy' : 'no-policy');
    badge.textContent = skill.policy ? 'policy set' : 'no policy';
    info.appendChild(name);
    info.appendChild(desc);
    info.appendChild(badge);

    const actions = document.createElement('div');
    actions.className = 'skill-actions';

    const toggle = document.createElement('button');
    toggle.className = 'toggle-enabled' + (skill.enabled ? ' on' : '');
    toggle.textContent = skill.enabled ? 'enabled' : 'disabled';
    toggle.onclick = () => toggleSkill(skill);

    const edit = document.createElement('button');
    edit.className = 'btn-sm btn-secondary';
    edit.textContent = 'Edit';
    edit.onclick = () => showSkillForm(skill);

    const del = document.createElement('button');
    del.className = 'btn-sm btn-danger';
    del.textContent = 'Del';
    del.onclick = () => deleteSkill(skill.id);

    actions.appendChild(toggle);
    actions.appendChild(edit);
    actions.appendChild(del);

    card.appendChild(info);
    card.appendChild(actions);
    return card;
  }

  function showSkillForm(skill) {
    const container = document.getElementById('skill-form-container');
    const isEdit = !!skill;
    const form = document.createElement('div');
    form.className = 'skill-form';

    const nameLabel = document.createElement('label');
    nameLabel.textContent = 'Tool name';
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.id = 'sf-name';
    nameInput.placeholder = 'e.g. kubectl';
    if (skill) nameInput.value = skill.name;

    const descLabel = document.createElement('label');
    descLabel.textContent = 'Description';
    const descInput = document.createElement('textarea');
    descInput.id = 'sf-desc';
    descInput.placeholder = 'Describe how the agent should use this tool\u2026';
    if (skill) descInput.value = skill.description;

    const policyLabel = document.createElement('label');
    policyLabel.textContent = 'Policy (Rego rules \u2014 leave empty to disable)';
    const policyInput = document.createElement('textarea');
    policyInput.id = 'sf-policy';
    policyInput.style.fontFamily = 'ui-monospace, monospace';
    policyInput.value = (skill?.policy) ?? '';

    const formActions = document.createElement('div');
    formActions.className = 'form-actions';

    const save = document.createElement('button');
    save.className = 'btn-sm btn-secondary';
    save.textContent = isEdit ? 'Save' : 'Add Skill';
    save.onclick = isEdit ? () => saveSkill(skill.id) : createSkill;

    const cancel = document.createElement('button');
    cancel.className = 'btn-sm btn-secondary';
    cancel.textContent = 'Cancel';
    cancel.onclick = hideSkillForm;

    formActions.appendChild(save);
    formActions.appendChild(cancel);

    const genBtn = document.createElement('button');
    genBtn.type = 'button';
    genBtn.className = 'btn-sm btn-secondary';
    genBtn.textContent = 'Generate with AI';
    genBtn.onclick = () => showPolicyPopup(form);

    form.appendChild(nameLabel);   form.appendChild(nameInput);
    form.appendChild(descLabel);   form.appendChild(descInput);
    form.appendChild(policyLabel); form.appendChild(policyInput);
    form.appendChild(genBtn);
    form.appendChild(formActions);

    container.innerHTML = '';
    container.appendChild(form);
  }

  function hideSkillForm() {
    document.getElementById('skill-form-container').innerHTML = '';
  }

  function showPolicyPopup(form) {
    const existing = form.querySelector('.policy-popup');
    if (existing) { existing.querySelector('textarea').focus(); return; }

    const popup = document.createElement('div');
    popup.className = 'policy-popup';

    const label = document.createElement('label');
    label.textContent = 'Describe the policy in plain English';

    const textarea = document.createElement('textarea');
    textarea.id = 'sf-policy-desc';
    textarea.placeholder = 'e.g. only allow kubectl get and kubectl describe commands';
    textarea.rows = 3;

    const actions = document.createElement('div');
    actions.className = 'form-actions';

    const genBtn = document.createElement('button');
    genBtn.type = 'button';
    genBtn.className = 'btn-sm btn-secondary';
    genBtn.textContent = 'Generate';
    genBtn.onclick = () => generatePolicy(popup, genBtn);

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'btn-sm btn-secondary';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = () => popup.remove();

    actions.appendChild(genBtn);
    actions.appendChild(cancelBtn);
    popup.appendChild(label);
    popup.appendChild(textarea);
    popup.appendChild(actions);
    form.appendChild(popup);
    textarea.focus();
  }

  async function generatePolicy(popup, genBtn) {
    const plainDesc = popup.querySelector('textarea').value.trim();
    if (!plainDesc) { alert('Please describe the policy first.'); return; }

    const skillName = document.getElementById('sf-name').value.trim();
    const skillDesc = document.getElementById('sf-desc').value.trim();

    genBtn.disabled = true;
    genBtn.textContent = 'Generating\u2026';

    try {
      const res = await fetch('/api/skills/generate-policy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          skill_name: skillName,
          skill_description: skillDesc,
          description: plainDesc,
        }),
      });
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody.detail || 'HTTP ' + res.status);
      }
      const data = await res.json();

      const policyTextarea = document.getElementById('sf-policy');
      const existing = policyTextarea.value.trim();
      policyTextarea.value = existing ? existing + '\n\n' + data.policy : data.policy;

      popup.remove();
    } catch (e) {
      alert('Failed to generate policy: ' + e.message);
      genBtn.disabled = false;
      genBtn.textContent = 'Generate';
    }
  }

  async function createSkill() {
    const name   = document.getElementById('sf-name').value.trim();
    const desc   = document.getElementById('sf-desc').value.trim();
    const policy = document.getElementById('sf-policy').value.trim() || null;
    if (!name || !desc) { alert('Name and description are required.'); return; }
    const res = await fetch('/api/skills', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc, policy }),
    });
    if (!res.ok) { alert('Failed to create skill.'); return; }
    hideSkillForm();
    await loadSkills();
  }

  async function saveSkill(id) {
    const name   = document.getElementById('sf-name').value.trim();
    const desc   = document.getElementById('sf-desc').value.trim();
    const policy = document.getElementById('sf-policy').value.trim() || null;
    if (!name || !desc) { alert('Name and description are required.'); return; }
    const res = await fetch('/api/skills/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc, policy }),
    });
    if (!res.ok) { alert('Failed to save skill.'); return; }
    hideSkillForm();
    await loadSkills();
  }

  async function toggleSkill(skill) {
    const res = await fetch('/api/skills/' + skill.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: !skill.enabled }),
    });
    if (!res.ok) { alert('Failed to toggle skill.'); return; }
    await loadSkills();
  }

  async function deleteSkill(id) {
    if (!confirm('Delete this skill?')) return;
    const res = await fetch('/api/skills/' + id, { method: 'DELETE' });
    if (!res.ok) { alert('Failed to delete skill.'); return; }
    await loadSkills();
  }

  // ── Per-conversation skill overrides ───────────────────
  let convSkillsData = [];   // [{id, name, enabled, effective_enabled, ...}]
  let pendingOverrides = {}; // skill_id → bool, applied on first submit of a new chat

  async function loadConvSkills(runId) {
    if (!runId) {
      document.getElementById('conv-skills-bar').classList.add('hidden');
      return;
    }
    try {
      const res = await fetch('/api/agent/runs/' + runId + '/skills');
      if (res.ok) {
        convSkillsData = await res.json();
      } else {
        // Run not found server-side (e.g. after restart) — still show the bar
        // using the global skill list so the user knows the feature exists.
        const fallback = await fetch('/api/skills');
        convSkillsData = fallback.ok ? (await fallback.json()).map(s => ({ ...s, effective_enabled: s.enabled })) : [];
      }
    } catch {
      convSkillsData = [];
    }
    renderConvSkills(runId);
  }

  async function loadConvSkillsForNewChat() {
    pendingOverrides = {};
    try {
      const res = await fetch('/api/skills');
      convSkillsData = res.ok
        ? (await res.json()).map(s => ({ ...s, effective_enabled: s.enabled }))
        : [];
    } catch { convSkillsData = []; }
    renderConvSkills(null);  // null = pending mode
  }

  function renderConvSkills(runId) {
    const bar = document.getElementById('conv-skills-bar');
    const container = document.getElementById('conv-skills-toggles');
    container.innerHTML = '';
    bar.classList.remove('hidden');
    if (convSkillsData.length === 0) {
      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:11px;color:#9aa0a6;font-style:italic;';
      hint.textContent = 'No skills yet — add some in \u2699 Settings.';
      container.appendChild(hint);
      return;
    }
    for (const skill of convSkillsData) {
      const btn = document.createElement('button');
      btn.className = 'toggle-enabled btn-sm' + (skill.effective_enabled ? ' on' : '');
      btn.textContent = skill.name;
      btn.title = skill.description;
      btn.onclick = () => toggleConvSkill(runId, skill);
      container.appendChild(btn);
    }
  }

  async function toggleConvSkill(runId, skill) {
    if (!runId) {
      // New chat — no run yet, accumulate in pendingOverrides
      const next = !skill.effective_enabled;
      pendingOverrides[skill.id] = next;
      skill.effective_enabled = next;
      renderConvSkills(null);
      return;
    }
    try {
      const res = await fetch('/api/agent/runs/' + runId + '/skills/' + skill.id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: !skill.effective_enabled }),
      });
      if (!res.ok) return;
      await loadConvSkills(runId);
    } catch {}
  }

  async function applyPendingOverrides(runId) {
    const entries = Object.entries(pendingOverrides);
    if (entries.length === 0) return;
    await Promise.all(entries.map(([skillId, enabled]) =>
      fetch('/api/agent/runs/' + runId + '/skills/' + skillId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled }),
      })
    ));
    pendingOverrides = {};
  }

  // ── Utilities ──────────────────────────────────────────
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── Boot ───────────────────────────────────────────────
  loadAll();
</script>
</body>
</html>
