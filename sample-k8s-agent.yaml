# notesllm-agent ServiceAccount (Workload Identity)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ops-agent
---
# notesllm-agent ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
data:
  LLM_BASE_URL: "https://ai.exxeta.info"
  LLM_MODEL: "gpt-4.1"
  AGENT_ROLES: "INFRA_OBSERVER"
  MAX_ITERATIONS: "10"
---
# notesllm-agent OPA policy ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-policy
data:
  executor.rego: |
    package ops.agent

    role_commands := {
        "INFRA_OBSERVER": [
            ["kubectl", "get"],
            ["kubectl", "logs"],
            ["kubectl", "describe"],
            ["helm", "list"],
            ["helm", "status"],
        ],
        "INFRA_OPERATOR": [
            ["kubectl", "get"],
            ["kubectl", "logs"],
            ["kubectl", "describe"],
            ["kubectl", "rollout"],
            ["kubectl", "scale"],
            ["helm", "list"],
            ["helm", "status"],
            ["helm", "upgrade"],
        ],
    }

    default allow = false

    # True when the command targets Kubernetes secret resources
    targets_secrets {
        input.argv[_] = "secret"
    }

    targets_secrets {
        input.argv[_] = "secrets"
    }

    # INFRA_OBSERVER is not permitted to read secrets
    observer_secrets_forbidden {
        input.roles[_] = "INFRA_OBSERVER"
        targets_secrets
    }

    allow {
        not observer_secrets_forbidden
        some role
        some prefix
        input.roles[_] = role
        prefix = role_commands[role][_]
        array.slice(input.argv, 0, count(prefix)) = prefix
    }
---
# agent-runtime ConfigMap: defines tool installation and entrypoint script
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-runtime
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e

    echo "Installing Tool #1..."
    [...]

    echo "Installing Tool #2..."
    [...]

    echo "Installing Tool #3..."
    [...]

    echo "Tool installation complete."

    echo "Setting up environment..."
    [...]

    echo "Fetching AKS credentials..."
    export KUBECONFIG=/tmp/kubeconfig
    [...]

    echo "Converting kubeconfig for workload identity..."
    [...]

    # MANDATORY 
    echo "Starting agent..."
    exec uvicorn app.main:app --host 0.0.0.0 --port 8081
---
# ops-agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-deployment
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      serviceAccountName: ops-agent
      containers:
        - name: agent
          image: <IMAGE>
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: POLICY_PATH
              value: /etc/agent/policy.rego
            - name: LLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: LLM_BASE_URL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: LLM_MODEL
            - name: AGENT_ROLES
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: AGENT_ROLES
            - name: MAX_ITERATIONS
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: MAX_ITERATIONS
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secret
                  key: llm-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: runtime-volume
              mountPath: /etc/agent
              readOnly: true
            - name: policy-volume
              mountPath: /etc/agent/policy.rego
              subPath: executor.rego
              readOnly: true # make sure the agent does not modify the policy file
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
      volumes:
        - name: policy-volume
          configMap:
            name: agent-policy
        - name: runtime-volume
          configMap:
            name: agent-runtime
            defaultMode: 0755
---
# notesllm-agent Service
apiVersion: v1
kind: Service
metadata:
  name: agent-service
spec:
  selector:
    app: agent
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
